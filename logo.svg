<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Simmer">
  <defs>
    <linearGradient id="simPot" x1="0" y1="0" x2="0.25" y2="1">
      <stop offset="0" stop-color="#F9A53C"/>
      <stop offset="1" stop-color="#E85A0C"/>
    </linearGradient>
  </defs>

  <!-- steam -->
  <g fill="none" stroke="#F4A24A" stroke-width="3.4" stroke-linecap="round" opacity="0.85">
    <path d="M41 30 q-4.5 -4 0 -8 q4.5 -4 0 -8"/>
    <path d="M52 30 q-4.5 -4 0 -8 q4.5 -4 0 -8"/>
  </g>

  <!-- timer arc (sage) -->
  <path d="M64 26 a20 20 0 0 1 18 14" fill="none" stroke="#8FB89A" stroke-width="3.2" stroke-linecap="round" opacity="0.9"/>

  <!-- lid + knob -->
  <rect x="26" y="33" width="48" height="9" rx="4.5" fill="url(#simPot)"/>
  <rect x="45" y="27" width="10" height="7" rx="3.5" fill="url(#simPot)"/>

  <!-- handles -->
  <rect x="16" y="50" width="11" height="8" rx="4" fill="url(#simPot)"/>
  <rect x="73" y="50" width="11" height="8" rx="4" fill="url(#simPot)"/>

  <!-- pot body -->
  <path d="M26 44 h48 v18 a11 11 0 0 1 -11 11 h-26 a11 11 0 0 1 -11 -11 z" fill="url(#simPot)"/>

  <!-- S monogram -->
  <text x="50" y="69" text-anchor="middle" font-family="Fraunces, Georgia, 'Times New Roman', serif" font-size="34" font-weight="900" fill="#fff">S</text>

  <!-- leaf -->
  <path d="M70 64 q9 -1 12 -10 q-9 1 -12 10 z" fill="#6BA84F"/>
  <path d="M72 65 q4 -2 8 -7" fill="none" stroke="#4E8C3D" stroke-width="1.4" stroke-linecap="round"/>
</svg>
