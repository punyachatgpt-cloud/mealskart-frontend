<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — Simmer</title>
  <meta name="theme-color" content="#0D0702" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/svg+xml" href="/logo.svg" />
  <link rel="apple-touch-icon" href="/logo.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700;9..144,900&family=Manrope:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg0:          #FAFAF6;
      --bg1:          #ffffff;
      --ink:          #1C1008;
      --muted:        #6B4C2A;
      --muted2:       #9B7553;
      --surface:      rgba(250, 250, 246, 0.92);
      --border:       rgba(200, 160, 110, 0.38);
      --accent:       #C8690E;
      --accentGlow:   rgba(200, 105, 14, 0.18);
      --cta:          var(--accent);
      --positive:     #16a34a;
      --danger:       #dc2626;
      --ink-lo:       var(--muted);
      --ink-faint:    var(--muted2);
      --t-xs:         0.72rem;
      --t-sm:         0.84rem;
      --t-base:       0.96rem;
      --t-xl:         1.58rem;
      --fw-reg:       500;
      --fw-med:       700;
      --fw-bold:      800;
      --fw-black:     900;
      --sp-xs:        4px;
      --sp-sm:        8px;
      --sp-md:        16px;
      --sp-lg:        24px;
      --sp-xl:        40px;
      --shadow-float: 0 40px 80px -16px rgba(50,20,5,0.28);
      --radius:       20px;
    }
    [data-theme="dark"] {
      --bg0:          #0D0702;
      --bg1:          #160C05;
      --ink:          #F2E5CC;
      --muted:        #C4906A;
      --muted2:       #8A6035;
      --surface:      rgba(22, 12, 5, 0.97);
      --border:       rgba(180, 110, 45, 0.28);
      --accent:       #D4891C;
      --accentGlow:   rgba(212, 137, 28, 0.22);
      --shadow-float: 0 40px 80px -16px rgba(0,0,0,0.70);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
    html, body { height: 100%; }

    body {
      font-family: 'Manrope', system-ui, sans-serif;
      color: var(--ink);
      background: var(--bg0);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }
    [data-theme="dark"] body {
      background:
        radial-gradient(ellipse 70% 45% at 20% 5%, rgba(210,120,28,0.06) 0%, transparent 65%),
        radial-gradient(ellipse 50% 40% at 80% 95%, rgba(200,105,14,0.04) 0%, transparent 65%),
        #0D0702;
    }

    .auth-shell {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--sp-lg) var(--sp-md);
    }

    .auth-card {
      width: 100%;
      max-width: 400px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: var(--sp-xl) var(--sp-lg);
      box-shadow: var(--shadow-float);
      display: flex;
      flex-direction: column;
      gap: var(--sp-lg);
    }

    .auth-brand { text-align: center; }
    /* Transparent SVG mark — orange pot reads on light & dark; wordmark uses theme ink */
    .logo-mark { display: block; width: 64px; height: 64px; margin: 0 auto 8px;
      filter: drop-shadow(0 4px 10px rgba(200,105,14,0.28)); }
    .auth-brand .flame { font-size: 2.2rem; line-height: 1; display: block; margin-bottom: var(--sp-xs); }
    .auth-brand h1 {
      font-family: 'Fraunces', serif;
      font-size: var(--t-xl);
      font-weight: var(--fw-black);
      color: var(--ink);
      letter-spacing: -0.02em;
    }

    .auth-heading h2 {
      font-family: 'Fraunces', serif;
      font-size: var(--t-xl);
      font-weight: var(--fw-med);
      color: var(--ink);
      letter-spacing: -0.01em;
      line-height: 1.2;
      margin-bottom: var(--sp-xs);
    }
    .auth-heading p {
      font-size: var(--t-sm);
      color: var(--ink-lo);
      font-weight: var(--fw-reg);
      line-height: 1.5;
    }

    .auth-form { display: flex; flex-direction: column; gap: var(--sp-md); }

    .field-group { display: flex; flex-direction: column; gap: var(--sp-xs); }
    .field-label {
      font-size: var(--t-xs);
      font-weight: var(--fw-bold);
      color: var(--ink-lo);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .phone-input-wrap {
      display: flex;
      align-items: center;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      background: var(--bg0);
      transition: border-color 160ms ease, box-shadow 160ms ease;
      overflow: hidden;
    }
    .phone-input-wrap:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accentGlow);
    }
    .phone-input-wrap.error {
      border-color: var(--danger);
      box-shadow: 0 0 0 3px rgba(220,38,38,0.12);
    }
    .phone-prefix {
      padding: 14px 12px 14px 16px;
      font-size: var(--t-base);
      font-weight: var(--fw-bold);
      color: var(--ink-lo);
      border-right: 1.5px solid var(--border);
      white-space: nowrap;
      background: transparent;
      user-select: none;
    }
    .phone-input {
      flex: 1; border: none; background: transparent;
      padding: 14px 16px;
      font-size: var(--t-base);
      font-weight: var(--fw-med);
      color: var(--ink);
      font-family: inherit;
      outline: none;
      -webkit-appearance: none;
      min-width: 0;
    }
    .phone-input::placeholder { color: var(--ink-faint); font-weight: var(--fw-reg); }

    .field-error {
      font-size: var(--t-xs);
      color: var(--danger);
      font-weight: var(--fw-med);
      min-height: 18px;
      display: flex;
      align-items: center;
      gap: 4px;
      opacity: 0;
      transition: opacity 160ms ease;
    }
    .field-error.visible { opacity: 1; }

    .btn-cta {
      width: 100%;
      padding: 15px var(--sp-lg);
      background: var(--cta);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-family: inherit;
      font-size: var(--t-base);
      font-weight: var(--fw-bold);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--sp-sm);
      transition: transform 200ms ease, filter 200ms ease, box-shadow 200ms ease;
      box-shadow: 0 4px 16px -2px rgba(200,105,14,0.35);
    }
    .btn-cta:hover:not(:disabled) {
      filter: brightness(1.08);
      box-shadow: 0 8px 24px -4px rgba(200,105,14,0.45);
      transform: translateY(-1px);
    }
    .btn-cta:active:not(:disabled) { transform: scale(0.97); transition-duration: 80ms; }
    .btn-cta:disabled { opacity: 0.45; cursor: not-allowed; }

    .spinner {
      width: 18px; height: 18px;
      border: 2.5px solid rgba(255,255,255,0.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0; display: none;
    }
    .btn-cta.loading .spinner { display: block; }
    .btn-cta.loading .btn-label { opacity: 0.5; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .auth-divider {
      display: flex; align-items: center; gap: var(--sp-md);
      color: var(--ink-faint); font-size: var(--t-xs);
    }
    .auth-divider::before, .auth-divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    .auth-footer { text-align: center; font-size: var(--t-sm); color: var(--ink-lo); font-weight: var(--fw-reg); }
    .auth-footer a {
      color: var(--accent); font-weight: var(--fw-med); text-decoration: none;
      transition: opacity 150ms ease;
    }
    .auth-footer a:hover { opacity: 0.80; text-decoration: underline; }

    .auth-footer-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: var(--t-sm);
      color: var(--ink-lo);
    }
    .auth-footer-row a {
      color: var(--accent); font-weight: var(--fw-med); text-decoration: none;
      transition: opacity 150ms ease; font-size: var(--t-sm);
    }
    .auth-footer-row a:hover { opacity: 0.80; }

    .theme-toggle {
      position: fixed; top: 16px; right: 16px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 50%; width: 38px; height: 38px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 1rem;
      transition: background 200ms ease, border-color 200ms ease;
    }
    .theme-toggle:hover { border-color: var(--accent); }

    /* ── Segmented Phone ⇄ Email toggle ─────────────────────────── */
    .seg-toggle {
      position: relative; display: grid; grid-template-columns: 1fr 1fr;
      padding: 4px; background: var(--bg0);
      border: 1.5px solid var(--border); border-radius: 14px; isolation: isolate;
    }
    .seg-indicator {
      position: absolute; z-index: -1; top: 4px; bottom: 4px; left: 4px;
      width: calc(50% - 4px); border-radius: 10px;
      background: var(--surface); border: 1px solid var(--border);
      box-shadow: 0 2px 8px -2px rgba(50,20,5,0.20);
      transition: transform 280ms cubic-bezier(0.34,1.56,0.64,1);
    }
    .seg-toggle[data-active="email"] .seg-indicator { transform: translateX(100%); }
    .seg-btn {
      appearance: none; border: none; background: none; cursor: pointer; padding: 10px 0;
      font-family: inherit; font-size: var(--t-sm); font-weight: var(--fw-bold);
      letter-spacing: 0.01em; color: var(--ink-faint); transition: color 200ms ease;
    }
    .seg-btn.is-active { color: var(--ink); }
    .seg-btn:active { transform: scale(0.97); }
    .seg-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 10px; }

    .method-pane { display: flex; flex-direction: column; gap: var(--sp-md); }
    .method-pane[hidden] { display: none; }
    .method-pane.entering { animation: paneIn 280ms cubic-bezier(0.34,1.56,0.64,1) both; }
    @keyframes paneIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

    /* ── Generic input wrap (email/password) — same treatment as phone ── */
    .input-wrap {
      display: flex; align-items: center; border: 1.5px solid var(--border);
      border-radius: 12px; background: var(--bg0);
      transition: border-color 160ms ease, box-shadow 160ms ease; overflow: hidden;
    }
    .input-wrap:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accentGlow); }
    .input-wrap.error { border-color: var(--danger); box-shadow: 0 0 0 3px rgba(220,38,38,0.12); }
    .input-icon { padding: 14px 4px 14px 14px; font-size: var(--t-base); color: var(--ink-faint); display: flex; align-items: center; user-select: none; }
    .input-field {
      flex: 1; border: none; background: transparent; padding: 14px 16px 14px 8px;
      font-size: var(--t-base); font-weight: var(--fw-med); color: var(--ink);
      font-family: inherit; outline: none; -webkit-appearance: none; min-width: 0;
    }
    .input-field::placeholder { color: var(--ink-faint); font-weight: var(--fw-reg); }
    .input-eye {
      appearance: none; border: none; background: none; cursor: pointer; padding: 0 14px;
      display: flex; align-items: center; color: var(--ink-faint); transition: color 160ms ease; font-size: 1rem;
    }
    .input-eye:hover { color: var(--ink-lo); }
    .input-eye:focus-visible { outline: 2px solid var(--accent); outline-offset: -2px; border-radius: 8px; }

    .field-hint-link {
      align-self: flex-end; margin-top: calc(-1 * var(--sp-sm));
      font-size: var(--t-xs); font-weight: var(--fw-med); color: var(--accent); text-decoration: none;
    }
    .field-hint-link:hover { opacity: 0.8; text-decoration: underline; }

    @keyframes errShake { 10%,90%{transform:translateX(-1px);} 30%,70%{transform:translateX(2px);} 50%{transform:translateX(-3px);} }
    .input-wrap.error.shake, .phone-input-wrap.error.shake { animation: errShake 320ms ease both; }

    @media (prefers-reduced-motion: reduce) {
      .seg-indicator, .method-pane.entering, .input-wrap.error.shake { animation: none !important; transition: none !important; }
    }
  </style>
</head>
<body>

  <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">🌙</button>

  <main class="auth-shell">
    <div class="auth-card" role="main">

      <div class="auth-brand">
        <img src="/logo.svg" alt="" class="logo-mark" />
        <h1>Simmer</h1>
      </div>

      <div class="auth-heading">
        <h2>Welcome back.</h2>
        <p id="authSub">Enter your number and we'll send a quick OTP.</p>
      </div>

      <div class="seg-toggle" id="segToggle" role="tablist" aria-label="Sign in method" data-active="phone">
        <span class="seg-indicator" aria-hidden="true"></span>
        <button type="button" class="seg-btn is-active" role="tab" aria-selected="true"  data-method="phone">Phone</button>
        <button type="button" class="seg-btn"           role="tab" aria-selected="false" data-method="email">Email</button>
      </div>

      <form class="auth-form" id="loginForm" novalidate>
        <!-- Phone pane -->
        <div class="method-pane" data-method="phone">
          <div class="field-group">
            <label class="field-label" for="phoneInput">Mobile number</label>
            <div class="phone-input-wrap" id="phoneWrap">
              <span class="phone-prefix">🇮🇳 +91</span>
              <input class="phone-input" id="phoneInput" type="tel" inputmode="numeric"
                     autocomplete="tel-national" placeholder="98765 43210" maxlength="10"
                     aria-describedby="phoneError" />
            </div>
            <span class="field-error" id="phoneError" role="alert" aria-live="polite"></span>
          </div>
        </div>

        <!-- Email pane -->
        <div class="method-pane" data-method="email" hidden>
          <div class="field-group">
            <label class="field-label" for="emailInput">Email address</label>
            <div class="input-wrap" id="emailWrap">
              <span class="input-icon" aria-hidden="true">✉️</span>
              <input class="input-field" id="emailInput" type="email" inputmode="email"
                     autocomplete="email" placeholder="you@kitchen.com" aria-describedby="emailError" />
            </div>
            <span class="field-error" id="emailError" role="alert" aria-live="polite"></span>
          </div>
          <div class="field-group">
            <label class="field-label" for="pwInput">Password</label>
            <div class="input-wrap" id="pwWrap">
              <span class="input-icon" aria-hidden="true">🔒</span>
              <input class="input-field" id="pwInput" type="password" autocomplete="current-password"
                     placeholder="••••••••" aria-describedby="pwError" />
              <button type="button" class="input-eye" id="pwEye" aria-label="Show password" aria-pressed="false">👁️</button>
            </div>
            <a class="field-hint-link" href="/recover.html">Forgot password?</a>
            <span class="field-error" id="pwError" role="alert" aria-live="polite"></span>
          </div>
        </div>

        <button type="submit" class="btn-cta" id="submitBtn">
          <div class="spinner" aria-hidden="true"></div>
          <span class="btn-label" id="btnLabel">Send OTP</span>
        </button>
      </form>

      <div class="auth-footer-row">
        <a href="/recover.html">Trouble signing in?</a>
        <a href="/signup.html">Create account</a>
      </div>

    </div>
  </main>

  <script>
    (() => {
      const toggle = document.getElementById('themeToggle');
      const savedTheme = localStorage.getItem('simmer_theme') ||
        (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      applyTheme(savedTheme);
      toggle.addEventListener('click', () => {
        const next = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
        applyTheme(next);
        localStorage.setItem('simmer_theme', next);
      });
      function applyTheme(t) {
        document.documentElement.dataset.theme = t;
        toggle.textContent = t === 'dark' ? '☀️' : '🌙';
      }

      // Redirect if already logged in
      if (localStorage.getItem('simmer_token')) {
        window.location.href = '/';
      }

      const form     = document.getElementById('loginForm');
      const phoneInp = document.getElementById('phoneInput');
      const phoneWrap= document.getElementById('phoneWrap');
      const phoneErr = document.getElementById('phoneError');
      const emailInp = document.getElementById('emailInput');
      const emailWrap= document.getElementById('emailWrap');
      const emailErr = document.getElementById('emailError');
      const pwInp    = document.getElementById('pwInput');
      const pwWrap   = document.getElementById('pwWrap');
      const pwErr    = document.getElementById('pwError');
      const btn      = document.getElementById('submitBtn');
      const btnLabel = document.getElementById('btnLabel');
      const authSub  = document.getElementById('authSub');
      const seg      = document.getElementById('segToggle');
      const panes    = [...document.querySelectorAll('.method-pane')];

      let method = localStorage.getItem('simmer_auth_method') === 'email' ? 'email' : 'phone';

      // ── Field error helpers ──
      function fieldError(wrap, errEl, input, msg) {
        errEl.textContent = '⚠ ' + msg; errEl.classList.add('visible');
        wrap.classList.add('error'); input.setAttribute('aria-invalid', 'true');
        wrap.classList.add('shake');
        wrap.addEventListener('animationend', () => wrap.classList.remove('shake'), { once: true });
      }
      function clearFieldError(wrap, errEl, input) {
        errEl.classList.remove('visible'); wrap.classList.remove('error'); input.removeAttribute('aria-invalid');
      }

      // ── Method toggle ──
      function setMethod(m) {
        method = m;
        seg.dataset.active = m;
        seg.querySelectorAll('.seg-btn').forEach(b => {
          const on = b.dataset.method === m;
          b.classList.toggle('is-active', on);
          b.setAttribute('aria-selected', String(on));
        });
        panes.forEach(p => {
          const on = p.dataset.method === m;
          p.hidden = !on;
          if (on) { p.classList.add('entering'); p.addEventListener('animationend', () => p.classList.remove('entering'), { once: true }); }
        });
        btnLabel.textContent = m === 'phone' ? 'Send OTP' : 'Sign in';
        authSub.textContent  = m === 'phone'
          ? "Enter your number and we'll send a quick OTP."
          : 'Sign in with your email and password.';
        localStorage.setItem('simmer_auth_method', m);
        const focusEl = m === 'phone' ? phoneInp : emailInp;
        setTimeout(() => focusEl.focus(), 60);
      }
      seg.querySelectorAll('.seg-btn').forEach(b =>
        b.addEventListener('click', () => setMethod(b.dataset.method)));
      setMethod(method);

      // ── Password show/hide ──
      const pwEye = document.getElementById('pwEye');
      pwEye.addEventListener('click', () => {
        const show = pwInp.type === 'password';
        pwInp.type = show ? 'text' : 'password';
        pwEye.setAttribute('aria-pressed', String(show));
        pwEye.setAttribute('aria-label', show ? 'Hide password' : 'Show password');
        pwEye.textContent = show ? '🙈' : '👁️';
      });

      // ── Input listeners ──
      phoneInp.addEventListener('input', () => {
        phoneInp.value = phoneInp.value.replace(/\D/g, '');
        if (phoneInp.value.length > 0) clearFieldError(phoneWrap, phoneErr, phoneInp);
      });
      emailInp.addEventListener('input', () => clearFieldError(emailWrap, emailErr, emailInp));
      pwInp.addEventListener('input', () => clearFieldError(pwWrap, pwErr, pwInp));

      const EMAIL_RE = /^[^@\s]+@[^@\s]+\.[^@\s]+$/;
      function setLoading(on) { btn.disabled = on; btn.classList.toggle('loading', on); }

      // ── Submit (method-aware) ──
      form.addEventListener('submit', async (e) => {
        e.preventDefault();

        if (method === 'phone') {
          clearFieldError(phoneWrap, phoneErr, phoneInp);
          const digits = phoneInp.value.replace(/\D/g, '');
          if (digits.length !== 10)      return fieldError(phoneWrap, phoneErr, phoneInp, 'Enter a valid 10-digit Indian mobile number.'), phoneInp.focus();
          if (!/^[6-9]/.test(digits))    return fieldError(phoneWrap, phoneErr, phoneInp, 'Indian mobile numbers start with 6, 7, 8, or 9.'), phoneInp.focus();
          setLoading(true);
          const phone = '+91' + digits;
          try {
            const res  = await fetch('/api/auth/request-otp', {
              method: 'POST', headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ phone })
            });
            const data = await res.json().catch(() => ({}));
            if (res.ok) {
              sessionStorage.setItem('simmer_pending_phone', phone);
              sessionStorage.setItem('simmer_otp_intent', 'login');
              window.location.href = '/verify-otp.html';
            } else {
              fieldError(phoneWrap, phoneErr, phoneInp, data.detail || data.message || 'Could not send OTP. Please try again.');
              setLoading(false);
            }
          } catch { fieldError(phoneWrap, phoneErr, phoneInp, 'Network error — check your connection.'); setLoading(false); }
          return;
        }

        // Email login
        clearFieldError(emailWrap, emailErr, emailInp);
        clearFieldError(pwWrap, pwErr, pwInp);
        const email = emailInp.value.trim().toLowerCase();
        const pw    = pwInp.value;
        if (!EMAIL_RE.test(email)) return fieldError(emailWrap, emailErr, emailInp, 'Enter a valid email address.'), emailInp.focus();
        if (!pw)                   return fieldError(pwWrap, pwErr, pwInp, 'Enter your password.'), pwInp.focus();
        setLoading(true);
        try {
          const res  = await fetch('/api/auth/email-login', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password: pw })
          });
          const data = await res.json().catch(() => ({}));
          if (res.ok && data.access_token) {
            localStorage.setItem('simmer_token', data.access_token);
            window.location.href = data.is_new_user ? '/onboarding.html' : '/';
          } else if (res.status === 403) {
            fieldError(emailWrap, emailErr, emailInp, data.detail || 'Please verify your email first — check your inbox.');
            setLoading(false);
          } else {
            fieldError(pwWrap, pwErr, pwInp, data.detail || 'Incorrect email or password.');
            setLoading(false);
          }
        } catch { fieldError(pwWrap, pwErr, pwInp, 'Network error — check your connection.'); setLoading(false); }
      });
    })();
  </script>
</body>
</html>
