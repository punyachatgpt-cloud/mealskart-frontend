<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile — Simmer</title>
  <meta name="theme-color" content="#C8690E" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700;9..144,900&family=Manrope:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg0:          #FAFAF6;
      --bg1:          #ffffff;
      --ink:          #1C1008;
      --muted:        #6B4C2A;
      --muted2:       #9B7553;
      --surface:      rgba(250,250,246,0.94);
      --border:       rgba(200,160,110,0.34);
      --accent:       #C8690E;
      --accent2:      #9E4E08;
      --accentGlow:   rgba(200,105,14,0.18);
      --positive:     #16a34a;
      --ink-lo:       var(--muted);
      --ink-faint:    var(--muted2);
      --t-xs:  0.72rem; --t-sm: 0.84rem; --t-base: 0.96rem;
      --t-lg:  1.2rem;  --t-xl: 1.58rem; --t-display: 2.2rem;
      --fw-reg: 500; --fw-med: 700; --fw-bold: 800; --fw-black: 900;
      --sp-xs: 4px; --sp-sm: 8px; --sp-md: 16px; --sp-lg: 24px; --sp-xl: 40px;
      --radius: 20px; --shadow: 0 4px 20px -4px rgba(50,20,5,0.12);
      --shadow-lg: 0 16px 48px -8px rgba(50,20,5,0.18);
    }
    [data-theme="dark"] {
      --bg0:    #0D0702; --bg1:   #160C05;
      --ink:    #F2E5CC; --muted: #C4906A; --muted2: #8A6035;
      --surface: rgba(22,12,5,0.96); --border: rgba(180,110,45,0.26);
      --accent: #D4891C; --accent2: #A86210;
      --accentGlow: rgba(212,137,28,0.22);
      --shadow: 0 4px 20px -4px rgba(0,0,0,0.4);
      --shadow-lg: 0 16px 48px -8px rgba(0,0,0,0.55);
    }
    * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
    html, body { height: 100%; scroll-behavior: smooth; }
    body {
      margin: 0; font-family: 'Manrope', system-ui, sans-serif;
      color: var(--ink); background: var(--bg0); min-height: 100vh;
    }
    [data-theme="dark"] body { background: var(--bg0); }

    /* ── Topbar ── */
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px; background: var(--surface);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(16px); position: sticky; top: 0; z-index: 10;
    }
    .topbarBrand {
      font-family: 'Fraunces', serif; font-size: 1.2rem; font-weight: 900;
      color: var(--accent); text-decoration: none;
    }
    .topbarBrand:hover { opacity: 0.85; }
    .themeBtn {
      background: none; border: 1px solid var(--border); border-radius: 999px;
      width: 32px; height: 32px; font-size: 0.9rem; cursor: pointer;
      display: grid; place-items: center; transition: border-color 0.15s;
      color: var(--ink);
    }
    .themeBtn:hover { border-color: var(--accent); }

    /* ── Page shell ── */
    .shell {
      width: min(720px, 100%); margin: 0 auto;
      padding: 28px clamp(14px,3vw,28px) 64px;
    }

    /* ── Hero card ── */
    .heroCard {
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      border-radius: var(--radius); padding: 28px 24px; margin-bottom: 28px;
      display: flex; align-items: center; gap: 20px; color: #fff;
      box-shadow: 0 8px 32px rgba(200,105,14,0.28);
    }
    .heroAvatar {
      width: 72px; height: 72px; border-radius: 50%;
      background: rgba(255,255,255,0.22); display: grid; place-items: center;
      font-size: 2rem; font-weight: 900; flex-shrink: 0;
      border: 3px solid rgba(255,255,255,0.4);
    }
    .heroName {
      font-family: 'Fraunces', serif; font-size: var(--t-xl); font-weight: 900;
      margin: 0 0 2px; line-height: 1.1;
    }
    .heroEmail { font-size: var(--t-xs); opacity: 0.8; margin: 0; }
    .heroJoined { font-size: var(--t-xs); opacity: 0.65; margin-top: 4px; }
    .heroSignIn {
      margin-top: 10px; background: rgba(255,255,255,0.2);
      border: 1.5px solid rgba(255,255,255,0.5); border-radius: 999px;
      padding: 6px 16px; color: #fff; font-family: inherit;
      font-size: var(--t-xs); font-weight: var(--fw-bold); cursor: pointer;
      text-decoration: none; display: inline-block;
      transition: background 0.15s;
    }
    .heroSignIn:hover { background: rgba(255,255,255,0.32); }

    /* ── Stat grid ── */
    .statGrid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
      margin-bottom: 28px;
    }
    @media (max-width: 400px) { .statGrid { grid-template-columns: repeat(2, 1fr); } }
    .statCard {
      background: var(--bg1); border: 1px solid var(--border);
      border-radius: 16px; padding: 16px; text-align: center;
      box-shadow: var(--shadow);
    }
    [data-theme="dark"] .statCard { background: #1a0e06; }
    .statVal {
      font-family: 'Fraunces', serif; font-size: var(--t-xl); font-weight: 900;
      color: var(--accent); line-height: 1; margin-bottom: 4px;
    }
    .statLbl { font-size: var(--t-xs); color: var(--muted2); font-weight: var(--fw-med); }

    /* ── Section ── */
    .section { margin-bottom: 28px; }
    .sectionHead {
      font-size: var(--t-xs); font-weight: var(--fw-bold); color: var(--accent);
      text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 12px;
    }

    /* ── Taste bars ── */
    .tasteBar { display: flex; flex-direction: column; gap: 8px; }
    .tasteRow { display: flex; align-items: center; gap: 10px; }
    .tasteName { font-size: var(--t-sm); font-weight: var(--fw-med); color: var(--ink); min-width: 120px; }
    .tasteTrack {
      flex: 1; height: 7px; background: var(--border); border-radius: 999px; overflow: hidden;
    }
    .tasteFill {
      height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 999px; transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
    }
    .tasteCount { font-size: var(--t-xs); color: var(--muted2); min-width: 28px; text-align: right; }

    /* ── Cook log list ── */
    .logList { display: flex; flex-direction: column; gap: 8px; }
    .logEntry {
      display: flex; align-items: center; gap: 12px;
      background: var(--bg1); border: 1px solid var(--border);
      border-radius: 14px; padding: 11px 14px; cursor: pointer;
      box-shadow: var(--shadow); transition: border-color 0.15s;
    }
    [data-theme="dark"] .logEntry { background: #1a0e06; }
    .logEntry:hover { border-color: var(--accent); }
    .logThumb {
      width: 48px; height: 48px; border-radius: 10px; object-fit: cover;
      background: rgba(200,105,14,0.08); flex-shrink: 0;
    }
    .logNoThumb {
      width: 48px; height: 48px; border-radius: 10px; flex-shrink: 0;
      background: rgba(200,105,14,0.08); display: grid; place-items: center;
      font-size: 1.4rem;
    }
    .logBody { flex: 1; min-width: 0; }
    .logName { font-size: var(--t-sm); font-weight: var(--fw-bold); color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .logMeta { font-size: var(--t-xs); color: var(--muted2); margin-top: 2px; }
    .logStars { font-size: var(--t-xs); color: #f59e0b; letter-spacing: 1px; }

    /* ── Achievements ── */
    .badgeGrid { display: flex; flex-wrap: wrap; gap: 10px; }
    .achieveBadge {
      display: flex; align-items: center; gap: 8px;
      background: var(--bg1); border: 1px solid var(--border);
      border-radius: 12px; padding: 8px 14px; box-shadow: var(--shadow);
    }
    [data-theme="dark"] .achieveBadge { background: #1a0e06; }
    .achieveBadge.locked { opacity: 0.38; filter: grayscale(1); }
    .achieveIcon { font-size: 1.3rem; line-height: 1; }
    .achieveBody { display: flex; flex-direction: column; }
    .achieveName { font-size: var(--t-xs); font-weight: var(--fw-bold); color: var(--ink); }
    .achieveDesc { font-size: 0.62rem; color: var(--muted2); }

    /* ── For You picks ── */
    .pickRow {
      display: flex; gap: 10px; overflow-x: auto; padding-bottom: 4px;
      scrollbar-width: none;
    }
    .pickRow::-webkit-scrollbar { display: none; }
    .pickCard {
      flex: 0 0 130px; border-radius: 14px; overflow: hidden; cursor: pointer;
      background: var(--bg1); border: 1px solid var(--border);
      box-shadow: var(--shadow); display: flex; flex-direction: column;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .pickCard:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); }
    [data-theme="dark"] .pickCard { background: #1a0e06; }
    .pickImg { width: 100%; height: 82px; object-fit: cover; display: block; background: rgba(200,105,14,0.07); }
    .pickNoImg { width: 100%; height: 82px; display: grid; place-items: center; font-size: 1.6rem; background: rgba(200,105,14,0.07); }
    .pickBody { padding: 7px 8px 9px; flex: 1; }
    .pickName { font-size: 0.7rem; font-weight: 700; color: #1C1008; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin: 0 0 3px; }
    [data-theme="dark"] .pickName { color: #F2E5CC; }
    .pickMeta { font-size: 0.62rem; color: #9B7553; }
    [data-theme="dark"] .pickMeta { color: #C4906A; }

    /* ── Misc ── */
    .emptyNote {
      font-size: var(--t-sm); color: var(--muted2); text-align: center; padding: 20px 0;
    }
    .signOutBtn {
      width: 100%; background: none; border: 1px solid var(--border);
      border-radius: 14px; padding: 14px; font-family: inherit;
      font-size: var(--t-base); font-weight: var(--fw-med); color: var(--muted);
      cursor: pointer; transition: border-color 0.15s, color 0.15s; margin-top: 8px;
    }
    .signOutBtn:hover { border-color: #dc2626; color: #dc2626; }

    @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:none; } }
    .shell > * { animation: fadeIn 0.4s ease both; }
    .shell > *:nth-child(2) { animation-delay: 60ms; }
    .shell > *:nth-child(3) { animation-delay: 120ms; }
    .shell > *:nth-child(4) { animation-delay: 180ms; }
    .shell > *:nth-child(5) { animation-delay: 240ms; }
    .shell > *:nth-child(6) { animation-delay: 300ms; }
  </style>
</head>
<body>
  <header class="topbar">
    <a class="topbarBrand" href="/">🔥 Simmer.</a>
    <button class="themeBtn" id="themeBtn" title="Toggle theme">🌙</button>
  </header>

  <div class="shell">
    <!-- Hero -->
    <div class="heroCard" id="heroCard">
      <div class="heroAvatar" id="heroAvatar">?</div>
      <div>
        <p class="heroName" id="heroName">Your Profile</p>
        <p class="heroEmail" id="heroEmail"></p>
        <p class="heroJoined" id="heroJoined"></p>
        <a class="heroSignIn" href="/login.html" id="heroSignInLink" style="display:none">Sign in to sync your data →</a>
      </div>
    </div>

    <!-- Stats -->
    <div class="statGrid">
      <div class="statCard"><div class="statVal" id="statCooked">0</div><div class="statLbl">Recipes cooked</div></div>
      <div class="statCard"><div class="statVal" id="statStreak">0</div><div class="statLbl">Day streak 🔥</div></div>
      <div class="statCard"><div class="statVal" id="statSaved">0</div><div class="statLbl">Saved recipes</div></div>
    </div>

    <!-- Favourite cuisines -->
    <div class="section" id="cuisineSection" style="display:none">
      <div class="sectionHead">Favourite cuisines</div>
      <div class="tasteBar" id="cuisineBar"></div>
    </div>

    <!-- For You picks -->
    <div class="section" id="forYouSection" style="display:none">
      <div class="sectionHead">✨ Picked for you</div>
      <div class="pickRow" id="pickRow"></div>
    </div>

    <!-- Recent cook history -->
    <div class="section" id="historySection">
      <div class="sectionHead">Recent cooking</div>
      <div class="logList" id="logList">
        <p class="emptyNote">No recipes cooked yet. Start cooking on Simmer!</p>
      </div>
    </div>

    <!-- Achievements -->
    <div class="section">
      <div class="sectionHead">Achievements</div>
      <div class="badgeGrid" id="badgeGrid"></div>
    </div>

    <!-- Sign out -->
    <div id="signOutSection" style="display:none">
      <button class="signOutBtn" id="signOutBtn">Sign out</button>
    </div>
  </div>

  <script>
    const API_BASE_URL = "/api";
    const COOK_LOG_KEY = "simmer_cook_log_v1";
    const SAVED_KEY    = "simmer_saved_v1";

    // ── Theme ──────────────────────────────────────────────────────────────────
    (function() {
      const saved = localStorage.getItem("simmer_theme");
      if (saved) document.documentElement.setAttribute("data-theme", saved);
      document.getElementById("themeBtn").addEventListener("click", () => {
        const next = document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark";
        document.documentElement.setAttribute("data-theme", next);
        localStorage.setItem("simmer_theme", next);
        document.getElementById("themeBtn").textContent = next === "dark" ? "☀️" : "🌙";
      });
      if (saved === "dark") document.getElementById("themeBtn").textContent = "☀️";
    })();

    // ── Helpers ────────────────────────────────────────────────────────────────
    function esc(s) {
      return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }
    function getCookLog()    { try { return JSON.parse(localStorage.getItem(COOK_LOG_KEY)||"[]"); } catch { return []; } }
    function getSaved()      { try { return JSON.parse(localStorage.getItem(SAVED_KEY)||"[]"); } catch { return []; } }
    function titleCase(s)    { return (s||"").replace(/-/g," ").replace(/\b\w/g, c=>c.toUpperCase()); }

    // ── Streak ────────────────────────────────────────────────────────────────
    function calcStreak(log) {
      if (!log.length) return 0;
      const days = new Set(log.map(e => new Date(e.ts).toDateString()));
      const today = new Date();
      let streak = 0;
      for (let i = 0; i < 365; i++) {
        const d = new Date(today); d.setDate(today.getDate() - i);
        if (days.has(d.toDateString())) streak++;
        else if (i > 0) break;
      }
      return streak;
    }

    // ── Hero ──────────────────────────────────────────────────────────────────
    async function loadHero() {
      const token = localStorage.getItem("simmer_token");
      const nameEl   = document.getElementById("heroName");
      const emailEl  = document.getElementById("heroEmail");
      const avatarEl = document.getElementById("heroAvatar");
      const joinedEl = document.getElementById("heroJoined");
      const signInLinkEl = document.getElementById("heroSignInLink");

      if (!token) {
        nameEl.textContent  = "Guest";
        emailEl.textContent = "";
        avatarEl.textContent = "👤";
        signInLinkEl.style.display = "inline-block";
        return;
      }

      try {
        const res  = await fetch(`${API_BASE_URL}/auth/me`, { headers: { Authorization: `Bearer ${token}` } });
        const data = await res.json();
        if (!res.ok) throw new Error();
        const email = data.email || "";
        const initials = email ? email[0].toUpperCase() : "U";
        nameEl.textContent   = data.display_name || email.split("@")[0] || "Chef";
        emailEl.textContent  = email;
        avatarEl.textContent = initials;
        if (data.created_at) {
          const d = new Date(data.created_at);
          joinedEl.textContent = "Member since " + d.toLocaleDateString("en-IN", { month: "long", year: "numeric" });
        }
        document.getElementById("signOutSection").style.display = "block";
      } catch {
        nameEl.textContent   = "Chef";
        avatarEl.textContent = "👤";
        signInLinkEl.style.display = "inline-block";
      }
    }

    // ── Stats ─────────────────────────────────────────────────────────────────
    function loadStats() {
      const log    = getCookLog();
      const saved  = getSaved();
      document.getElementById("statCooked").textContent = log.length;
      document.getElementById("statStreak").textContent = calcStreak(log);
      document.getElementById("statSaved").textContent  = saved.length;
    }

    // ── Cuisine bars ──────────────────────────────────────────────────────────
    function loadCuisines() {
      const log    = getCookLog();
      const counts = {};
      log.forEach(e => {
        const cat = (e.category || "other").toLowerCase();
        counts[cat] = (counts[cat] || 0) + 1;
      });
      const sorted = Object.entries(counts).sort((a,b) => b[1]-a[1]).slice(0, 5);
      if (!sorted.length) return;

      const max  = sorted[0][1];
      const sec  = document.getElementById("cuisineSection");
      const bar  = document.getElementById("cuisineBar");
      sec.style.display = "block";
      bar.innerHTML = sorted.map(([cat, n]) => `
        <div class="tasteRow">
          <span class="tasteName">${esc(titleCase(cat))}</span>
          <div class="tasteTrack"><div class="tasteFill" style="width:${Math.round(n/max*100)}%"></div></div>
          <span class="tasteCount">${n}</span>
        </div>`).join("");
    }

    // ── Cook log list ─────────────────────────────────────────────────────────
    function loadHistory() {
      const log  = getCookLog().slice().reverse().slice(0, 10);
      const list = document.getElementById("logList");
      if (!log.length) return;
      list.innerHTML = log.map(e => {
        const stars = e.stars > 0 ? "★".repeat(e.stars) + "☆".repeat(5-e.stars) : "";
        const date  = new Date(e.ts).toLocaleDateString("en-IN", { day: "numeric", month: "short" });
        return `
          <div class="logEntry" onclick="window.location='/#recipe/${e.id}'">
            <div class="logNoThumb">🍽️</div>
            <div class="logBody">
              <div class="logName">${esc(e.name)}</div>
              <div class="logMeta">${date}${e.calories ? " · " + e.calories + " cal" : ""}${stars ? "" : ""}</div>
              ${stars ? `<div class="logStars">${stars}</div>` : ""}
            </div>
          </div>`;
      }).join("");
    }

    // ── Achievements ──────────────────────────────────────────────────────────
    function loadAchievements() {
      const log   = getCookLog();
      const saved = getSaved();
      const cats  = new Set(log.map(e => (e.category||"").toLowerCase()));
      const total = log.length;
      const streak= calcStreak(log);

      const all = [
        { icon:"🍳", name:"First Cook",      desc:"Cooked your first recipe",          unlocked: total >= 1 },
        { icon:"🔟", name:"10 Recipes",       desc:"Cooked 10 recipes",                 unlocked: total >= 10 },
        { icon:"💯", name:"Century Chef",     desc:"Cooked 100 recipes",                unlocked: total >= 100 },
        { icon:"🔥", name:"On a Roll",        desc:"3-day cooking streak",              unlocked: streak >= 3 },
        { icon:"⚡", name:"Speed Runner",     desc:"Streak of 7 days",                  unlocked: streak >= 7 },
        { icon:"🌍", name:"World Traveller",  desc:"Tried 4 different cuisines",        unlocked: cats.size >= 4 },
        { icon:"🏆", name:"Master Chef",      desc:"Cooked from every cuisine",         unlocked: cats.size >= 7 },
        { icon:"❤️", name:"Food Lover",       desc:"Saved 10+ recipes",                 unlocked: saved.length >= 10 },
        { icon:"⭐", name:"Critic",           desc:"Rated 5 recipes",                   unlocked: log.filter(e=>e.stars>0).length >= 5 },
      ];

      const grid = document.getElementById("badgeGrid");
      const unlocked = all.filter(b => b.unlocked);
      const locked   = all.filter(b => !b.unlocked).slice(0, 4);
      grid.innerHTML = [...unlocked, ...locked].map(b => `
        <div class="achieveBadge ${b.unlocked ? "" : "locked"}">
          <span class="achieveIcon">${b.icon}</span>
          <div class="achieveBody">
            <span class="achieveName">${esc(b.name)}</span>
            <span class="achieveDesc">${esc(b.desc)}</span>
          </div>
        </div>`).join("");
    }

    // ── For You picks ─────────────────────────────────────────────────────────
    async function loadForYou() {
      const log    = getCookLog();
      const saved  = getSaved();
      const ids    = [...new Set([
        ...log.map(e => String(e.id)),
        ...saved.map(r => String(r.id || r))
      ])].slice(0, 30);
      if (!ids.length) return;

      const sec = document.getElementById("forYouSection");
      const row = document.getElementById("pickRow");
      sec.style.display = "block";
      row.innerHTML = '<span style="font-size:0.75rem;color:var(--muted2);padding:6px 0">Loading…</span>';

      try {
        const params = new URLSearchParams({ liked_ids: ids.join(","), limit: 10 });
        const resp   = await fetch(`${API_BASE_URL}/for-you?${params}`);
        const items  = await resp.json();
        if (!Array.isArray(items) || !items.length) { sec.style.display = "none"; return; }

        row.innerHTML = items.map(r => `
          <div class="pickCard" onclick="window.location='/?open=${r.id}'">
            ${r.image_url
              ? `<img class="pickImg" src="${esc(r.image_url)}" alt="${esc(r.name)}" loading="lazy">`
              : `<div class="pickNoImg">🍽️</div>`}
            <div class="pickBody">
              <p class="pickName">${esc(r.name||"")}</p>
              <p class="pickMeta">⏱ ${r.time_minutes||"?"}m &middot; ${r.calories||"?"}kcal</p>
            </div>
          </div>`).join("");
      } catch { sec.style.display = "none"; }
    }

    // ── Sign out ───────────────────────────────────────────────────────────────
    document.getElementById("signOutBtn").addEventListener("click", () => {
      if (!confirm("Sign out of Simmer?")) return;
      localStorage.removeItem("simmer_token");
      localStorage.removeItem("simmer_user");
      window.location.href = "/login.html";
    });


    // ── Init ──────────────────────────────────────────────────────────────────
    loadHero();
    loadStats();
    loadCuisines();
    loadHistory();
    loadAchievements();
    loadForYou();
  </script>
</body>
</html>
