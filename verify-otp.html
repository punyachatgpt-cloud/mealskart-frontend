<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verify OTP — Simmer</title>
  <meta name="theme-color" content="#0D0702" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/svg+xml" href="/logo.svg" />
  <link rel="apple-touch-icon" href="/logo.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700;9..144,900&family=Manrope:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg0:          #FAFAF6;
      --bg1:          #ffffff;
      --ink:          #1C1008;
      --muted:        #6B4C2A;
      --muted2:       #9B7553;
      --surface:      rgba(250, 250, 246, 0.92);
      --border:       rgba(200, 160, 110, 0.38);
      --accent:       #C8690E;
      --accentGlow:   rgba(200, 105, 14, 0.18);
      --cta:          var(--accent);
      --positive:     #16a34a;
      --danger:       #dc2626;
      --ink-hi:       var(--ink);
      --ink-lo:       var(--muted);
      --ink-faint:    var(--muted2);
      --t-xs:         0.72rem;
      --t-sm:         0.84rem;
      --t-base:       0.96rem;
      --t-lg:         1.2rem;
      --t-xl:         1.58rem;
      --t-display:    2.2rem;
      --fw-reg:       500;
      --fw-med:       700;
      --fw-bold:      800;
      --fw-black:     900;
      --sp-xs:        4px;
      --sp-sm:        8px;
      --sp-md:        16px;
      --sp-lg:        24px;
      --sp-xl:        40px;
      --shadow-card:  0 4px 16px -2px rgba(50,20,5,0.10);
      --shadow-float: 0 40px 80px -16px rgba(50,20,5,0.28);
      --radius:       20px;
    }
    [data-theme="dark"] {
      --bg0:          #0D0702;
      --bg1:          #160C05;
      --ink:          #F2E5CC;
      --muted:        #C4906A;
      --muted2:       #8A6035;
      --surface:      rgba(22, 12, 5, 0.97);
      --border:       rgba(180, 110, 45, 0.28);
      --accent:       #D4891C;
      --accentGlow:   rgba(212, 137, 28, 0.22);
      --shadow-card:  0 4px 16px -2px rgba(0,0,0,0.40);
      --shadow-float: 0 40px 80px -16px rgba(0,0,0,0.70);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
    html, body { height: 100%; }

    body {
      font-family: 'Manrope', system-ui, sans-serif;
      color: var(--ink);
      background: var(--bg0);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }
    [data-theme="dark"] body {
      background:
        radial-gradient(ellipse 70% 45% at 20% 5%, rgba(210,120,28,0.06) 0%, transparent 65%),
        radial-gradient(ellipse 50% 40% at 80% 95%, rgba(200,105,14,0.04) 0%, transparent 65%),
        #0D0702;
    }

    .auth-shell {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--sp-lg) var(--sp-md);
    }

    /* Back nav */
    .auth-nav {
      width: 100%;
      max-width: 400px;
      margin-bottom: var(--sp-md);
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: var(--sp-xs);
      color: var(--ink-lo);
      font-size: var(--t-sm);
      font-weight: var(--fw-med);
      text-decoration: none;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 0;
      font-family: inherit;
      transition: color 150ms ease;
    }
    .back-btn:hover { color: var(--ink); }
    .back-btn svg { width: 16px; height: 16px; flex-shrink: 0; }

    .auth-card {
      width: 100%;
      max-width: 400px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: var(--sp-xl) var(--sp-lg);
      box-shadow: var(--shadow-float);
      display: flex;
      flex-direction: column;
      gap: var(--sp-lg);
    }

    .auth-heading h2 {
      font-family: 'Fraunces', serif;
      font-size: var(--t-xl);
      font-weight: var(--fw-med);
      color: var(--ink);
      letter-spacing: -0.01em;
      line-height: 1.2;
      margin-bottom: var(--sp-xs);
    }
    .auth-heading p {
      font-size: var(--t-sm);
      color: var(--ink-lo);
      font-weight: var(--fw-reg);
      line-height: 1.5;
    }
    .auth-heading .phone-display {
      font-weight: var(--fw-bold);
      color: var(--ink);
    }

    /* ── OTP input row ────────────────────────────────── */
    .otp-form {
      display: flex;
      flex-direction: column;
      gap: var(--sp-md);
    }

    .otp-row {
      display: flex;
      gap: var(--sp-sm);
      justify-content: center;
    }

    .otp-digit {
      width: 52px;
      height: 60px;
      border: 2px solid var(--border);
      border-radius: 12px;
      background: var(--bg0);
      color: var(--ink);
      font-size: 1.6rem;
      font-weight: var(--fw-black);
      font-family: inherit;
      text-align: center;
      outline: none;
      -webkit-appearance: none;
      caret-color: var(--accent);
      transition: border-color 160ms ease, box-shadow 160ms ease, transform 120ms ease;
    }
    .otp-digit:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accentGlow);
    }
    .otp-digit.filled {
      border-color: var(--accent);
      transform: scale(1.04);
    }
    .otp-digit.error {
      border-color: var(--danger);
      animation: shake 0.35s ease;
    }
    .otp-digit.success {
      border-color: var(--positive);
      animation: popIn 0.25s cubic-bezier(0.34,1.56,0.64,1);
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-5px); }
      40%       { transform: translateX(5px); }
      60%       { transform: translateX(-4px); }
      80%       { transform: translateX(4px); }
    }
    @keyframes popIn {
      from { transform: scale(0.8); }
      to   { transform: scale(1); }
    }

    /* Error / success messages */
    .otp-error {
      font-size: var(--t-xs);
      color: var(--danger);
      font-weight: var(--fw-med);
      text-align: center;
      min-height: 18px;
      opacity: 0;
      transition: opacity 160ms ease;
    }
    .otp-error.visible { opacity: 1; }

    /* CTA button */
    .btn-cta {
      width: 100%;
      padding: 15px var(--sp-lg);
      background: var(--cta);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-family: inherit;
      font-size: var(--t-base);
      font-weight: var(--fw-bold);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--sp-sm);
      transition: transform 200ms ease, filter 200ms ease, box-shadow 200ms ease;
      box-shadow: 0 4px 16px -2px rgba(200,105,14,0.35);
    }
    .btn-cta:hover:not(:disabled) {
      filter: brightness(1.08);
      box-shadow: 0 8px 24px -4px rgba(200,105,14,0.45);
      transform: translateY(-1px);
    }
    .btn-cta:active:not(:disabled) { transform: scale(0.97); transition-duration: 80ms; }
    .btn-cta:disabled { opacity: 0.45; cursor: not-allowed; }

    .spinner {
      width: 18px; height: 18px;
      border: 2.5px solid rgba(255,255,255,0.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
      display: none;
    }
    .btn-cta.loading .spinner { display: block; }
    .btn-cta.loading .btn-label { opacity: 0.5; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Resend row */
    .resend-row {
      text-align: center;
      font-size: var(--t-sm);
      color: var(--ink-lo);
    }
    #resendBtn {
      background: none;
      border: none;
      color: var(--accent);
      font-size: var(--t-sm);
      font-weight: var(--fw-med);
      cursor: pointer;
      font-family: inherit;
      text-decoration: underline;
      padding: 0;
      transition: opacity 150ms ease;
    }
    #resendBtn:disabled { color: var(--ink-faint); cursor: default; text-decoration: none; }
    #resendBtn:not(:disabled):hover { opacity: 0.80; }

    #countdown { font-weight: var(--fw-bold); color: var(--ink); }

    /* Theme toggle */
    .theme-toggle {
      position: fixed;
      top: 16px; right: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 50%;
      width: 38px; height: 38px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 1rem;
      transition: background 200ms ease, border-color 200ms ease;
    }
    .theme-toggle:hover { border-color: var(--accent); }
    .auth-brand { text-align:center; }
    .logo-mark { display:block; width:60px; height:60px; margin:0 auto 6px; filter:drop-shadow(0 4px 10px rgba(200,105,14,0.28)); }
    .auth-brand h1 { font-family:'Fraunces',serif; font-size:var(--t-xl); font-weight:var(--fw-black); color:var(--ink); letter-spacing:-0.02em; }
  </style>
</head>
<body>

  <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">🌙</button>

  <main class="auth-shell">

    <nav class="auth-nav">
      <a href="/signup.html" class="back-btn" id="backBtn">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10 12L6 8l4-4"/>
        </svg>
        Back
      </a>
    </nav>

    <div class="auth-card" role="main">

      <div class="auth-brand"><img src="/logo.svg" alt="" class="logo-mark" /><h1>Simmer</h1></div>

      <div class="auth-heading">
        <h2>Check your messages.</h2>
        <p>We sent a 6-digit code to <span class="phone-display" id="phoneDisplay">your number</span>.</p>
      </div>

      <form class="otp-form" id="otpForm" novalidate>

        <!-- 6-digit OTP inputs -->
        <div class="otp-row" id="otpRow" role="group" aria-label="One-time password digits">
          <input class="otp-digit" type="text" inputmode="numeric" maxlength="1" pattern="[0-9]" autocomplete="one-time-code" aria-label="Digit 1" data-index="0" />
          <input class="otp-digit" type="text" inputmode="numeric" maxlength="1" pattern="[0-9]" aria-label="Digit 2" data-index="1" />
          <input class="otp-digit" type="text" inputmode="numeric" maxlength="1" pattern="[0-9]" aria-label="Digit 3" data-index="2" />
          <input class="otp-digit" type="text" inputmode="numeric" maxlength="1" pattern="[0-9]" aria-label="Digit 4" data-index="3" />
          <input class="otp-digit" type="text" inputmode="numeric" maxlength="1" pattern="[0-9]" aria-label="Digit 5" data-index="4" />
          <input class="otp-digit" type="text" inputmode="numeric" maxlength="1" pattern="[0-9]" aria-label="Digit 6" data-index="5" />
        </div>

        <span class="otp-error" id="otpError" role="alert" aria-live="polite"></span>

        <button type="submit" class="btn-cta" id="verifyBtn" disabled>
          <div class="spinner" aria-hidden="true"></div>
          <span class="btn-label">Verify</span>
        </button>
      </form>

      <!-- Resend -->
      <div class="resend-row" id="resendRow">
        Didn't get it?
        <button id="resendBtn" disabled>Resend in <span id="countdown">0:30</span></button>
      </div>

    </div>
  </main>

  <script>
    (() => {
      // ── Theme ─────────────────────────────────────────────────
      const toggle = document.getElementById('themeToggle');
      const savedTheme = localStorage.getItem('simmer_theme') ||
        (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      applyTheme(savedTheme);
      toggle.addEventListener('click', () => {
        const next = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
        applyTheme(next);
        localStorage.setItem('simmer_theme', next);
      });
      function applyTheme(t) {
        document.documentElement.dataset.theme = t;
        toggle.textContent = t === 'dark' ? '☀️' : '🌙';
      }

      // ── Retrieve pending phone ─────────────────────────────────
      const phone  = sessionStorage.getItem('simmer_pending_phone') || '';
      const intent = sessionStorage.getItem('simmer_otp_intent') || 'signup';
      const backBtn = document.getElementById('backBtn');

      if (!phone) {
        // No pending session — redirect to start
        window.location.href = intent === 'login' ? '/login.html' : '/signup.html';
        return;
      }

      // Display masked phone
      const masked = phone.replace(/(\+\d{2})(\d{3})(\d{3})(\d{4})/, '$1 $2 $3 $4');
      document.getElementById('phoneDisplay').textContent = masked;
      backBtn.href = intent === 'login' ? '/login.html' : '/signup.html';

      // ── OTP inputs ────────────────────────────────────────────
      const digits    = Array.from(document.querySelectorAll('.otp-digit'));
      const verifyBtn = document.getElementById('verifyBtn');
      const errorEl   = document.getElementById('otpError');

      function getOtp() { return digits.map(d => d.value).join(''); }
      function isComplete() { return getOtp().length === 6 && /^\d{6}$/.test(getOtp()); }

      function showError(msg) {
        errorEl.textContent = '⚠ ' + msg;
        errorEl.classList.add('visible');
        digits.forEach(d => d.classList.add('error'));
        setTimeout(() => digits.forEach(d => d.classList.remove('error')), 600);
      }
      function clearError() {
        errorEl.classList.remove('visible');
      }

      // Auto-advance and paste handling
      digits.forEach((input, i) => {
        input.addEventListener('keydown', (e) => {
          if (e.key === 'Backspace') {
            if (!input.value && i > 0) {
              digits[i - 1].value = '';
              digits[i - 1].focus();
              digits[i - 1].classList.remove('filled');
            }
            input.classList.remove('filled');
            updateVerifyState();
            return;
          }
          // Only allow digits
          if (!/^\d$/.test(e.key) && !['Tab','ArrowLeft','ArrowRight','Delete'].includes(e.key)) {
            e.preventDefault();
          }
        });

        input.addEventListener('input', (e) => {
          // strip non-digits, take last char
          const val = input.value.replace(/\D/g, '').slice(-1);
          input.value = val;
          clearError();

          if (val) {
            input.classList.add('filled');
            if (i < 5) digits[i + 1].focus();
          } else {
            input.classList.remove('filled');
          }
          updateVerifyState();
        });

        // Paste handling — paste into any cell, fill from that cell forward
        input.addEventListener('paste', (e) => {
          e.preventDefault();
          const text = (e.clipboardData || window.clipboardData).getData('text');
          const nums = text.replace(/\D/g, '').slice(0, 6);
          if (!nums) return;

          nums.split('').forEach((ch, offset) => {
            const idx = i + offset;
            if (idx < 6) {
              digits[idx].value = ch;
              digits[idx].classList.add('filled');
            }
          });

          // Focus the next empty digit or last one
          const nextEmpty = digits.findIndex((d, idx) => idx >= i && !d.value);
          (nextEmpty >= 0 ? digits[nextEmpty] : digits[5]).focus();
          clearError();
          updateVerifyState();
        });

        // Select all on focus so re-entry is easy
        input.addEventListener('focus', () => input.select());
      });

      function updateVerifyState() {
        verifyBtn.disabled = !isComplete();
      }

      // Auto-focus first digit on load
      digits[0].focus();

      // ── Verify submit ─────────────────────────────────────────
      document.getElementById('otpForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        if (!isComplete()) return;
        clearError();

        verifyBtn.disabled = true;
        verifyBtn.classList.add('loading');

        const otp = getOtp();

        try {
          const res  = await fetch('/api/auth/verify-otp', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ phone, otp })
          });
          const data = await res.json().catch(() => ({}));

          if (res.ok) {
            // Store token
            if (data.access_token) {
              localStorage.setItem('simmer_token', data.access_token);
            }
            sessionStorage.removeItem('simmer_pending_phone');
            sessionStorage.removeItem('simmer_otp_intent');

            // New user → onboarding; returning → home
            const dest = (data.is_new_user || intent === 'signup')
              ? '/onboarding.html'
              : '/';
            window.location.href = dest;
          } else {
            showError(data.detail || data.message || 'Incorrect code — please try again.');
            verifyBtn.disabled = false;
            verifyBtn.classList.remove('loading');
          }
        } catch {
          showError('Network error — check your connection.');
          verifyBtn.disabled = false;
          verifyBtn.classList.remove('loading');
        }
      });

      // ── Resend countdown ──────────────────────────────────────
      const resendBtn   = document.getElementById('resendBtn');
      const countdownEl = document.getElementById('countdown');
      let remaining = 30;
      let timer;

      function startCountdown() {
        resendBtn.disabled = true;
        remaining = 30;
        updateCountdown();
        timer = setInterval(() => {
          remaining--;
          if (remaining <= 0) {
            clearInterval(timer);
            resendBtn.disabled = false;
            resendBtn.innerHTML = 'Resend OTP';
          } else {
            updateCountdown();
          }
        }, 1000);
      }

      function updateCountdown() {
        const m = Math.floor(remaining / 60);
        const s = remaining % 60;
        countdownEl.textContent = m + ':' + String(s).padStart(2, '0');
        resendBtn.innerHTML = 'Resend in <span id="countdown">' + m + ':' + String(s).padStart(2,'0') + '</span>';
      }

      startCountdown();

      resendBtn.addEventListener('click', async () => {
        resendBtn.disabled = true;
        resendBtn.textContent = 'Sending…';

        try {
          const res  = await fetch('/api/auth/request-otp', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ phone })
          });
          if (res.ok) {
            clearError();
            // Clear inputs
            digits.forEach(d => { d.value = ''; d.classList.remove('filled'); });
            digits[0].focus();
            updateVerifyState();
            startCountdown();
          } else {
            const data = await res.json().catch(() => ({}));
            showError(data.detail || 'Could not resend. Try again in a moment.');
            startCountdown();
          }
        } catch {
          showError('Network error — could not resend.');
          startCountdown();
        }
      });
    })();
  </script>
</body>
</html>
